<!doctype html>
<html lang="en">
  <head>
    <script>
      // Defensive containment for environments overriding window.fetch
      try {
        if (window && window.fetch) {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() {
              return currentFetch;
            },
            set(v) {
              currentFetch = v;
            }
          });
        }
      } catch (e) {
        console.warn("Fetch property descriptor patch bypassed", e);
      }
    </script>
