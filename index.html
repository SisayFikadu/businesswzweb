<!doctype html>
<html lang="en">
  <head>
    <script>
      // Defensive containment for environments overriding window.fetch
      try {
        if (window && window.fetch) {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() {
              return currentFetch;
            },
            set(v) {
              currentFetch = v;
            }
          });
        }
      } catch (e) {
        console.warn("Fetch property descriptor patch bypassed", e);
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusinessWZWeb — Elite Web Architecture & Enterprise Modernization</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
